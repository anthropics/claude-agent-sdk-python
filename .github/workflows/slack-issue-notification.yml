name: Post new issues to Slack

on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack payload
        id: build_payload
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          REPO: ${{ github.repository }}
        run: |
          payload=$(jq -n \
            --arg title "$ISSUE_TITLE" \
            --arg url "$ISSUE_URL" \
            --arg number "$ISSUE_NUMBER" \
            --arg author "$ISSUE_AUTHOR" \
            --arg repo "$REPO" \
            '{
              channel: "C09HY5E0K60",
              text: "New issue opened in \($repo)",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*New Issue:* <\($url)|#\($number) \($title)>"
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "*Author:* \($author)"
                  }
                }
              ]
            }')
          echo "payload=$payload" >> "$GITHUB_OUTPUT"
      - name: Post to Slack
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # 2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: ${{ steps.build_payload.outputs.payload }}
